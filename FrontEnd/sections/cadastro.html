<!-- CADASTRO -->
  <div id="cadastro"
    class="hidden min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-indigo-900 to-violet-900">

    <div class="w-full max-w-md bg-white/10 backdrop-blur-2xl border border-white/20 rounded-[30px] shadow-2xl p-8">

      <h2 class="text-3xl font-bold text-white text-center mb-8">
        Criar Conta
      </h2>

      <input id="cadUsuario" placeholder="Nome"
        class="w-full mb-4 px-5 py-4 rounded-2xl bg-white/10 border border-white/20 text-white" />

      <input id="cadEmail" placeholder="Email"
        class="w-full mb-4 px-5 py-4 rounded-2xl bg-white/10 border border-white/20 text-white" />

      <input id="cadSenha" type="password" placeholder="Senha"
        class="w-full mb-5 px-5 py-4 rounded-2xl bg-white/10 border border-white/20 text-white" />

      <button id="fazerCadastro" class="w-full bg-violet-600 hover:bg-violet-700 py-4 rounded-2xl font-bold text-white">
        Cadastrar
      </button>

      <p id="cadSucesso" class="hidden text-green-400 text-center mt-4">
        Cadastro realizado com sucesso
      </p>

      <button id="voltarCadastro" class="mt-6 text-slate-300 w-full">
        ← Voltar
      </button>

    </div>
  </div>
