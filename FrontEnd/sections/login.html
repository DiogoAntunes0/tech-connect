<!-- LOGIN -->
  <!-- LOGIN -->
  <div id="login"
    class="hidden min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-indigo-900 to-violet-900">

    <div class="w-full max-w-md bg-white/10 backdrop-blur-2xl border border-white/20 rounded-[30px] shadow-2xl p-8">

      <h2 class="text-3xl font-bold text-white text-center mb-2">
        Entrar na TechConnect
      </h2>

      <p class="text-slate-300 text-center mb-8">
        Acesse sua conta
      </p>

      <!-- LOGIN SOCIAL -->
      <div class="space-y-3 mb-6">

        <button id="googleLogin"
          class="w-full bg-white text-slate-800 py-3 rounded-2xl font-semibold flex items-center justify-center gap-3 hover:scale-[1.02] transition">
          <img width="22" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
          Entrar com Google
        </button>

        <button id="githubLogin"
          class="w-full bg-black text-white py-3 rounded-2xl font-semibold flex items-center justify-center gap-3 hover:scale-[1.02] transition">
          <img width="22" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg">
          Entrar com GitHub
        </button>

      </div>

      <div class="flex items-center gap-3 mb-6">
        <hr class="flex-1 border-white/20">
        <span class="text-slate-400 text-sm">ou</span>
        <hr class="flex-1 border-white/20">
      </div>

      <input id="loginEmail" type="email" placeholder="Seu email"
        class="w-full mb-4 px-5 py-4 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-slate-300 outline-none" />

      <input id="loginSenha" type="password" placeholder="Senha"
        class="w-full mb-5 px-5 py-4 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-slate-300 outline-none" />

      <button id="fazerLogin"
        class="w-full bg-indigo-600 hover:bg-indigo-700 py-4 rounded-2xl font-bold text-white shadow-xl">
        Entrar
      </button>

      <p id="loginErro" class="hidden text-red-400 text-center mt-4">
        Email ou senha inválidos
      </p>

      <button id="voltarLogin" class="mt-6 text-slate-300 w-full">
        ← Voltar
      </button>

    </div>
  </div>
