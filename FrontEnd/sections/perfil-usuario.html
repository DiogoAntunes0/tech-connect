<div id="perfilUsuario" class="hidden min-h-screen bg-gradient-to-br from-slate-950 via-indigo-950 to-violet-950 text-white">

  <!-- HEADER -->
  <header class="bg-white/5 backdrop-blur border-b border-white/10 p-6 flex justify-between items-center">
    <h2 class="text-2xl font-bold">Meu Perfil</h2>

    <button id="voltarPerfilUsuario" class="px-4 py-2 rounded-xl border border-white/20 hover:bg-white/10 transition">
      ← Voltar
    </button>
  </header>

  <section class="max-w-4xl mx-auto p-8">

    <div class="bg-white/5 backdrop-blur-xl rounded-3xl shadow-2xl p-8 border border-white/10">

      <!-- TOPO -->
      <div class="flex flex-col md:flex-row gap-8 items-center">

        <div class="relative">

          <img id="previewFoto"
            class="w-32 h-32 rounded-full object-cover border-4 border-white/20 shadow-lg hidden">

          <div id="perfilInicial"
            class="w-32 h-32 rounded-full bg-gradient-to-br from-indigo-600 to-violet-700 text-white flex items-center justify-center text-4xl font-bold shadow-lg">
            L
          </div>

          <label
            class="absolute bottom-0 right-0 bg-white/10 text-white p-2 rounded-full cursor-pointer shadow-lg hover:scale-110 transition">
            ✎
            <input type="file" id="inputFoto" class="hidden" accept="image/*">
          </label>

        </div>

        <div class="flex-1">
          <h3 id="perfilUserNome" class="text-3xl font-bold"></h3>
          <p id="perfilUserEmail" class="text-indigo-300 mt-2"></p>

          <p class="mt-4 text-slate-300">
            Membro da plataforma TechConnect.
          </p>
        </div>

        <div class="mt-6 w-full md:w-auto">
          <label class="font-semibold text-indigo-300">Biografia</label>

          <textarea id="editarBio"
            class="w-full mt-2 bg-white/5 border border-white/10 rounded-xl p-3 h-28 resize-none text-white placeholder-slate-400 outline-none focus:ring-2 focus:ring-indigo-500 transition"
            placeholder="Fale um pouco sobre você..."></textarea>
        </div>

      </div>

      <hr class="my-8 border-white/10">

      <div class="grid md:grid-cols-2 gap-6">

        <div>
          <label class="font-semibold text-indigo-300">Nome</label>
          <input id="editarNome"
            class="w-full mt-2 bg-white/5 border border-white/10 rounded-xl p-3 text-white outline-none focus:ring-2 focus:ring-indigo-500 transition">
        </div>

        <div>
          <label class="font-semibold text-indigo-300">Email</label>
          <input id="editarEmail"
            class="w-full mt-2 bg-white/5 border border-white/10 rounded-xl p-3 text-white outline-none focus:ring-2 focus:ring-indigo-500 transition">
        </div>

      </div>

      <button id="salvarPerfilUsuario"
        class="mt-8 bg-gradient-to-r from-indigo-600 to-violet-700 hover:opacity-90 text-white px-8 py-3 rounded-2xl shadow-xl transition hover:scale-[1.02]">
        Salvar alterações
      </button>

      <p id="perfilSalvo" class="hidden mt-4 text-green-400 font-semibold">
        ✔ Perfil atualizado com sucesso
      </p>

    </div>

  </section>
</div>
