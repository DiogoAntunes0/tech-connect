<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechConnect</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white">
  <!-- ================= HOME ================= -->
  <div id="home">
    <header class="bg-white border-b shadow-sm">
      <nav class="container mx-auto flex justify-between items-center p-4">
        <div class="flex items-center">
          <img src="./assets/techconnect-logo.png" alt="TechConnect" class="h-20" />
        </div>
        <div id="navButtons" class="flex gap-4">
          <button id="btnLogin" class="bg-green-600 text-white px-4 py-2 rounded-lg">
            Entrar
          </button>
          <button id="btnCadastro" class="border border-green-600 px-4 py-2 rounded-lg text-green-600">
            Cadastrar
          </button>
        </div>

        <div id="userArea" class="hidden flex gap-4 items-center">
          <span id="userEmail"></span>
          <button id="btnLogout" class="bg-red-500 text-white px-3 py-1 rounded">
            Sair
          </button>
        </div>
      </nav>
    </header>

    <!-- HERO -->
    <section class="text-center py-20 bg-green-50">
      <h2 class="text-4xl font-bold mb-4 text-gray-800">
        Encontre especialistas em TI perto de você
      </h2>
      <p class="text-gray-500 mb-6">
        Suporte técnico, redes, servidores e desenvolvimento
      </p>

      <div class="flex justify-center">
        <input id="searchInput" placeholder="Buscar por área de TI (ex: redes, suporte...)"
          class="px-4 py-3 border rounded-l-lg w-72" />
        <button id="btnBuscar" class="bg-green-600 text-white px-6 rounded-r-lg">
          Buscar
        </button>
      </div>
    </section>

    <!-- LISTA -->
    <section class="container mx-auto py-16 px-4">
      <h2 class="text-2xl font-bold mb-8 text-gray-800">
        Especialistas em TI disponíveis
      </h2>

      <div id="listaTecnicos" class="grid md:grid-cols-3 gap-6"></div>
    </section>
  </div>

  <!-- ================= LOGIN ================= -->
  <div id="login" class="hidden min-h-screen flex justify-center items-center bg-gray-100">
    <div class="bg-white p-8 rounded-xl shadow w-80">
      <h2 class="text-xl font-bold mb-4 text-center">Login</h2>

      <input id="loginEmail" type="email" placeholder="Email" class="w-full mb-3 px-4 py-2 border rounded" />

      <input id="loginSenha" type="password" placeholder="Senha" class="w-full mb-3 px-4 py-2 border rounded" />

      <button id="fazerLogin" class="w-full bg-green-600 text-white py-2 rounded">
        Entrar
      </button>

      <p id="loginErro" class="text-red-500 text-sm hidden mt-2">
        Dados inválidos
      </p>

      <button id="voltarLogin" class="mt-4 w-full text-gray-500">
        ← Voltar
      </button>
    </div>
  </div>

  <!-- ================= CADASTRO ================= -->
  <div id="cadastro" class="hidden min-h-screen flex justify-center items-center bg-gray-100">
    <div class="bg-white p-8 rounded-xl shadow w-80">
      <h2 class="text-xl font-bold mb-4 text-center">Cadastro</h2>

      <input id="cadEmail" type="email" placeholder="Email" class="w-full mb-3 px-4 py-2 border rounded" />

      <input id="cadSenha" type="password" placeholder="Senha" class="w-full mb-3 px-4 py-2 border rounded" />

      <button id="fazerCadastro" class="w-full bg-green-600 text-white py-2 rounded">
        Cadastrar
      </button>

      <p id="cadSucesso" class="text-green-600 text-sm hidden mt-2">
        Cadastro realizado!
      </p>

      <button id="voltarCadastro" class="mt-4 w-full text-gray-500">
        ← Voltar
      </button>
    </div>
  </div>

 <!-- MODAL TECNICO -->
<div id="modalTecnico" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center">
  <div class="bg-white p-6 rounded-xl w-80 relative">
    
    <button id="fecharModal" class="absolute top-2 right-2 text-gray-500">
      ✖
    </button>

    <h2 id="modalNome" class="text-xl font-bold mb-2"></h2>
    <p id="modalArea" class="text-green-600"></p>
    <p id="modalCidade" class="text-gray-500"></p>
    <p id="modalRating" class="text-yellow-500 mb-4"></p>

    <button class="bg-green-600 text-white w-full py-2 rounded">
      Entrar em contato
    </button>
  </div>
</div>

  <script src="./script/script.js"></script>
</body>

</html>
