<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechConnect</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white">
  <!-- ================= HOME ================= -->
  <div id="home">
    <header class="bg-white border-b shadow-sm">
      <nav class="container mx-auto flex justify-between items-center p-4">
        <div class="flex items-center">
          <img src="./assets/techlogo.png" alt="TechConnect" class="h-20" />
        </div>
        <div id="navButtons" class="flex gap-4">
          <button id="btnLogin" class="bg-green-600 text-white px-4 py-2 rounded-lg">
            Entrar
          </button>
          <button id="btnCadastro" class="border border-green-600 px-4 py-2 rounded-lg text-green-600">
            Cadastrar
          </button>
        </div>

        <div id="userArea" class="hidden flex gap-4 items-center">
          <span id="userEmail"></span>
          <button id="btnLogout" class="bg-red-500 text-white px-3 py-1 rounded">
            Sair
          </button>
        </div>
      </nav>
    </header>

    <!-- HERO -->
    <section class="text-center py-28 bg-gradient-to-r from-green-600 to-green-800 text-white">
  <h2 class="text-5xl font-bold mb-4 tracking-tight">
    Encontre especialistas em TI perto de você
  </h2>

  <p class="text-green-100 mb-10 text-lg">
    Suporte técnico, redes, servidores e desenvolvimento
  </p>

  <div class="flex justify-center">
    <div class="flex items-center bg-white shadow-2xl rounded-2xl overflow-hidden border border-gray-100">
      
      <input 
        id="searchInput"
        placeholder="Buscar por área de TI (ex: redes, suporte...)"
        class="px-5 py-4 w-80 outline-none text-gray-700 placeholder-gray-400"
      />

      <button 
        id="btnBuscar"
        class="bg-green-700 hover:bg-green-800 transition text-white px-6 py-4 font-semibold"
      >
        Buscar
      </button>

    </div>
  </div>
</section>

    <!-- LISTA -->
    <section class="container mx-auto py-16 px-4">
      <h2 class="text-2xl font-bold mb-8 text-gray-800">
        Especialistas em TI disponíveis
      </h2>

      <div id="listaTecnicos" class="grid md:grid-cols-3 gap-6"></div>
    </section>
  </div>

  <!-- ================= LOGIN ================= -->
  <div id="login" class="hidden min-h-screen flex justify-center items-center bg-gray-100">
  <div class="bg-white p-8 rounded-2xl shadow-lg w-96">

    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">
      Bem-vindo de volta 👋
    </h2>

    <!-- LOGIN SOCIAL -->
    <div class="flex flex-col gap-3 mb-4">
      <button class="flex items-center justify-center gap-2 border py-2 rounded-lg hover:bg-gray-50 transition">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-5">
        Entrar com Google
      </button>

      <button class="flex items-center justify-center gap-2 border py-2 rounded-lg hover:bg-gray-50 transition">
        <img src="https://www.svgrepo.com/show/512317/github-142.svg" class="h-5">
        Entrar com GitHub
      </button>
    </div>

    <!-- DIVISOR -->
    <div class="flex items-center my-4">
      <hr class="flex-1 border-gray-300">
      <span class="px-2 text-gray-400 text-sm">ou</span>
      <hr class="flex-1 border-gray-300">
    </div>

    <!-- FORM -->
    <input id="loginEmail" type="email" placeholder="Email"
      class="w-full mb-3 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-800 outline-none" />

    <input id="loginSenha" type="password" placeholder="Senha"
      class="w-full mb-2 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-800 outline-none" />

    <!-- ESQUECEU SENHA -->
    <div class="text-right mb-4">
      <a href="#" class="text-sm text-green-800 hover:underline">
        Esqueceu a senha?
      </a>
    </div>

    <button id="fazerLogin"
      class="w-full bg-green-800 hover:bg-green-800 text-white py-2 rounded-lg transition">
      Entrar
    </button>

    <p id="loginErro" class="text-red-500 text-sm hidden mt-2 text-center">
      Dados inválidos
    </p>

    <!-- LEMBRAR -->
    <div class="flex items-center mt-4">
      <input type="checkbox" id="rememberMe" class="mr-2">
      <label for="rememberMe" class="text-sm text-gray-600">
        Lembrar de mim
      </label>
    </div>

    <button id="voltarLogin" class="mt-6 w-full text-gray-500 hover:underline">
      ← Voltar
    </button>

  </div>
</div>

  <!-- ================= CADASTRO ================= -->
  <div id="cadastro" class="hidden min-h-screen flex justify-center items-center bg-gray-100">
  <div class="bg-white p-8 rounded-2xl shadow-lg w-96">

    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">
      Criar conta 🚀
    </h2>

    <!-- SOCIAL -->
    <div class="flex flex-col gap-3 mb-4">
      <button class="flex items-center justify-center gap-2 border py-2 rounded-lg hover:bg-gray-50 transition">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-5">
        Cadastrar com Google
      </button>

      <button class="flex items-center justify-center gap-2 border py-2 rounded-lg hover:bg-gray-50 transition">
        <img src="https://www.svgrepo.com/show/512317/github-142.svg" class="h-5">
        Cadastrar com GitHub
      </button>
    </div>

    <!-- DIVISOR -->
    <div class="flex items-center my-4">
      <hr class="flex-1 border-gray-300">
      <span class="px-2 text-gray-400 text-sm">ou</span>
      <hr class="flex-1 border-gray-300">
    </div>

    <!-- FORM -->
    <input id="cadEmail" type="email" placeholder="Email"
      class="w-full mb-3 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-800 outline-none" />

    <input id="cadSenha" type="password" placeholder="Senha"
      class="w-full mb-4 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-800 outline-none" />

    <button id="fazerCadastro"
      class="w-full bg-green-800 hover:bg-green-800 text-white py-2 rounded-lg transition">
      Cadastrar
    </button>

    <p id="cadSucesso" class="text-green-800 text-sm hidden mt-3 text-center">
      Cadastro realizado!
    </p>

    <button id="voltarCadastro" class="mt-6 w-full text-gray-500 hover:underline">
      ← Voltar
    </button>

  </div>
</div>

 <div id="perfil" class="hidden min-h-screen bg-gray-100">

  <!-- TOPO / BANNER -->
  <div class="bg-gradient-to-r from-green-600 to-green-800 h-40"></div>

  <div class="max-w-3xl mx-auto -mt-20 px-4">

    <div class="bg-white rounded-2xl shadow-xl p-6">

      <!-- VOLTAR -->
      <button id="voltarPerfil" class="text-gray-500 hover:underline mb-4">
        ← Voltar
      </button>

      <!-- HEADER -->
      <div class="flex items-center gap-6">

        <img id="perfilFoto"
          class="w-32 h-32 rounded-full border-4 border-white shadow-md object-cover" />

        <div>
          <h2 id="perfilNome" class="text-2xl font-bold text-gray-800"></h2>

          <span id="perfilArea"
            class="inline-block bg-green-100 text-green-700 text-xs px-3 py-1 rounded-full mt-1">
          </span>

          <p id="perfilCidade" class="text-gray-500 text-sm mt-1"></p>
        </div>

      </div>

      <!-- INFO CARDS -->
      <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-6">

        <div class="bg-gray-50 p-4 rounded-xl text-center shadow-sm">
          <p class="text-xs text-gray-500">Idade</p>
          <p id="perfilIdade" class="font-bold text-lg"></p>
        </div>

        <div class="bg-gray-50 p-4 rounded-xl text-center shadow-sm">
          <p class="text-xs text-gray-500">Valor médio</p>
          <p class="font-bold text-lg text-green-700">
            R$ <span id="perfilValor"></span>
          </p>
        </div>

        <div class="bg-gray-50 p-4 rounded-xl text-center shadow-sm">
          <p class="text-xs text-gray-500">Avaliação</p>
          <p class="font-bold text-lg text-yellow-500">
            ⭐ <span id="perfilRating"></span>
          </p>
        </div>

      </div>

      <!-- BIO -->
      <div class="mt-6">
        <h3 class="font-semibold mb-2 text-gray-800">Sobre</h3>
        <p id="perfilBio" class="text-gray-600 leading-relaxed"></p>
      </div>

      <!-- BOTÃO -->
      <button id="btnChatPerfil"
        class="mt-6 w-full bg-green-700 hover:bg-green-800 transition text-white py-3 rounded-xl font-semibold shadow-md">
        Entrar em contato
      </button>

    </div>

  </div>
</div>

<!-- MODAL TECNICO -->
<div id="modalTecnico" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center">
  <div class="bg-white p-6 rounded-xl w-80 relative">
    
    <button id="fecharModal" class="absolute top-2 right-2 text-gray-500">
      ✖
    </button>

    <h2 id="modalNome" class="text-xl font-bold mb-2"></h2>
    <p id="modalArea" class="text-green-800"></p>
    <p id="modalCidade" class="text-gray-500"></p>
    <p id="modalRating" class="text-yellow-500 mb-4"></p>

    <button class="bg-green-800 text-white w-full py-2 rounded">
      Entrar em contato
    </button>
  </div>
</div>

  <!-- CHAT -->
<!-- CHAT MODERNO -->
<div id="chatBox" class="fixed bottom-6 right-6 w-80 h-[450px] bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden hidden z-50 animate-[fadeIn_.2s_ease]">

  <!-- HEADER -->
  <div class="bg-green-700 text-white p-3 flex justify-between items-center">
    <span class="text-green-300 text-xs">● online</span>
    <div>
      <h3 id="chatNome" class="font-semibold text-sm"></h3>
      <p id="chatArea" class="text-xs opacity-80"></p>
    </div>
    <button onclick="fecharChat()">✖</button>
  </div>

  <!-- MENSAGENS -->
  <div id="chatMensagens" class="flex-1 overflow-y-auto p-3 space-y-2 bg-gray-50">
  </div>

  <!-- INPUT -->
  <div class="p-2 border-t flex gap-2">
    <input 
      id="chatInput"
      placeholder="Mensagem..."
      class="flex-1 border rounded-lg px-2 py-1 text-sm outline-none"
    />
    <button 
      onclick="enviarMensagem()"
      class="bg-green-700 text-white px-3 rounded-lg text-sm"
    >
      ➤
    </button>
  </div>

</div>

  <script src="./script/script.js"></script>
</body>

</html>
